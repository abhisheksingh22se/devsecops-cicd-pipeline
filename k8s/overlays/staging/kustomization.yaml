apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

commonLabels:
  environment: staging

images:
  - name: app
    newName: 123456789012.dkr.ecr.us-east-1.amazonaws.com/devsecops-demo
    newTag: rc-latest  # Release Candidate tag

patches:
  - target:
      kind: Deployment
      name: devsecops-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: staging