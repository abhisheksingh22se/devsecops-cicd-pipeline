apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

commonLabels:
  environment: dev

images:
  - name: app
    # Replace with your actual ECR repository URI
    newName: devsecops-app
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: devsecops-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: development