apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-app-prod
  namespace: argocd
  labels:
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devsecops-project

  source:
    repoURL:        https://github.com/abhisheksingh22se/devsecops-pipeline.git
    targetRevision: main
    path:           k8s/overlays/prod

  destination:
    server:    https://kubernetes.default.svc
    namespace: prod

  # No automated sync for prod — manual approval required
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 2
      backoff:
        duration:    30s
        factor:      2
        maxDuration: 10m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas