apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-app-staging
  namespace: argocd
  labels:
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devsecops-project

  source:
    repoURL:        https://github.com/abhisheksingh22se/devsecops-pipeline.git
    targetRevision: main
    path:           k8s/overlays/staging

  destination:
    server:    https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration:    10s
        factor:      2
        maxDuration: 5m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas