name: DevSecOps CI/CD Pipeline

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch: 
# Required for AWS OIDC authentication (passwordless login)
permissions:
  id-token: write
  contents: write # Needed to commit Kustomize changes back to the repo
  security-events: write # Needed for uploading security scan results

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-demo
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-and-push:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SHIFT-LEFT SECURITY: Source Code Scanning (Snyk)
      - name: Snyk Code Vulnerability Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/package.json

      # 2. PASSWORDLESS AWS AUTH: OIDC Federation
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. BUILD THE IMAGE
      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

      # 4. SHIFT-LEFT SECURITY: Container Scanning (Trivy)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1' # Blocks the deployment if critical CVEs are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # 5. PUSH TO ECR (Only if Trivy passes)
      - name: Push Docker Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  update-gitops:
    name: Update ArgoCD Manifests
    needs: build-scan-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 6. GITOPS UPDATE: Modify the Kustomize file for ArgoCD
      - name: Update Kustomize Image Tag
        run: |
          cd k8s/overlays/prod
          # Using sed to find the old tag and replace it with the new Git SHA
          sed -i "s/newTag: .*/newTag: ${{ env.IMAGE_TAG }}/" kustomization.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "chore: update image tag to ${{ env.IMAGE_TAG }} [skip ci]"
          git push